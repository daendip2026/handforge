# HandForge Python — Runtime Configuration (v1.0.0)
# All values here are defaults. Override via environment variables or .env file.
# Environment variable pattern: HANDFORGE__<SECTION>__<KEY>
# Example: HANDFORGE__CAMERA__INDEX=1

version: "1.0.0"

camera:
  index: 0              # Webcam device index (0 = default system camera)
  width: 640            # Capture width in pixels
  height: 480           # Capture height in pixels
  fps: 30               # Requested capture FPS (driver may not honor exactly)
  disable_auto_exposure: true          # Set Exposure to manual mode (prevents flickering)
  disable_auto_focus: true             # Set Focus to fixed mode (prevents jitter)
  buffer_size: 1                       # Minimize latency by keeping only latest frame (1-10)
  jitter_threshold_multiplier: 1.5     # Alert if frame interval > N * expected (1.0-5.0)
  backend: "AUTO"                      # AUTO | ANY | DSHOW | MSMF | V4L2 | AVFOUNDATION
  fourcc: "MJPG"                       # Video codec format (e.g., MJPG, YUYV, H264)
  mirror_input: true                   # Mirror the input frame horizontally (standard for webcams)

mediapipe:
  model_path: "models/hand_landmarker.task"  # Path to the .task model file
  max_num_hands: 1                    # single hand only
  model_complexity: 1                 # 0=lite, 1=full — full required for world coords
  min_detection_confidence: 0.7
  min_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  warmup_frame_count: 5               # discard first N frames for JIT warmup

tracker:
  target_fps: 30                      # Minimum acceptable FPS
  primary_hand: "Right"               # "Right" | "Left"
  fps_window_size: 30                 # Number of frames for sliding-window (smoothing)

# Networking & Integration settings
output:
  mode: "websocket"                   # websocket | osc | console | none
  websocket:
    host: "127.0.0.1"
    port: 8080
  osc:
    host: "127.0.0.1"
    port: 9000
    address: "/handforge/landmarks"

logging:
  level: "INFO"                       # DEBUG | INFO | WARNING | ERROR
  log_dir: "logs"
  filename_prefix: "handforge"
  max_bytes: 10485760               # ~10MB per file
  backup_count: 5                   # Keep 5 rotated log files
  max_queue_size: 10000             # Bounded queue for async logging (OOM defense)
  console_enabled: true             # Show pretty logs in terminal
